<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script>
      window.addEventListener('error', function(e) {
        fetch('http://localhost:9999/', { method: 'POST', body: e.message + '\n' + e.filename + ':' + e.lineno });
      });
      window.addEventListener('unhandledrejection', function(e) {
        fetch('http://localhost:9999/', { method: 'POST', body: String(e.reason) });
      });
    </script>
    <title>LedgerX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-background font-body-md text-on-surface overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
